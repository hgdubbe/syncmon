# SQL SYNC WATCH - Monitor Configuration
# This configuration controls the behavior of the SQL Sync Watch Monitor
# The monitor continuously checks MySQL GTID synchronization and Redis replication
# on a master-slave setup (dbmaster + dbslave)

# ============================================
# MYSQL CONFIGURATION
# ============================================
# MySQL Master (dbmaster) - Binlog source
MYSQL_MASTER_HOST="172.31.49.233"
MYSQL_MASTER_PORT="3306"

# MySQL Slave (dbslave) - Direct network connection to slave for GTID checks
MYSQL_SLAVE_HOST="172.31.40.234"
MYSQL_SLAVE_PORT="3306"

# MySQL credentials (same user/password used for both master and slave)
# The user should have privileges to read GTID positions
MYSQL_USER="nextcloud"
MYSQL_PASSWORD=""  # Leave empty if using socket auth (.my.cnf) or no password

# ============================================
# REDIS CONFIGURATION
# ============================================
# Redis Replica (on dbmaster) - Local Redis instance
# This is where the master writes and this replica consumes from master
REDIS_SLAVE_HOST="172.31.40.233"
REDIS_SLAVE_PORT="6379"

# Redis Master (on dbslave) - Remote master instance
# Direct network connection to the master Redis on the slave host
REDIS_MASTER_HOST="172.31.40.234"
REDIS_MASTER_PORT="6379"

# Redis authentication credentials
REDIS_PASSWORD="nextcloud"
REDIS_DB="0"

# ============================================
# REPLICATION CONTROL
# ============================================
# Automatically start (or restart) slave replication on monitor startup
# Set to 1 to enable, 0 to disable (default: 0 = manual control)
# When enabled, the monitor will attempt to start replication on the slave
# using the START_SLAVE_COMMAND below
START_SLAVE_ON_START=0

# The exact MySQL command to start slave replication
# This is executed on MYSQL_SLAVE_HOST when START_SLAVE_ON_START=1
# Examples:
#   START SLAVE 'master01';     (MariaDB, named replication channels)
#   START REPLICA;              (MySQL 8.0+, fallback)
#   START SLAVE;                (Legacy MySQL)
START_SLAVE_COMMAND="START SLAVE 'master01';"

# ============================================
# STARTUP CHECKS
# ============================================
# Perform connectivity and configuration validation at startup
# Set to 1 to enable (default), 0 to skip
STARTUP_CHECK=1

# Exit immediately if any startup check fails
# Set to 1 for strict mode (fail-fast), 0 to continue with warnings
# Default: 0 (warn but continue, allowing manual recovery)
EXIT_ON_STARTUP_FAILURE=0

# ============================================
# MONITORING INTERVAL & THRESHOLDS
# ============================================
# How often to run synchronization checks (in seconds)
# Interval between MySQL GTID and Redis replication checks
CHECK_INTERVAL=30

# Number of consecutive failed checks before flagging as ERROR
# Thresholds protect against transient network issues
FAILURE_THRESHOLD=3

# ============================================
# CHECK ENABLEMENT
# ============================================
# Enable/disable specific checks (1=enabled, 0=disabled)
ENABLE_MYSQL_CHECK=1
ENABLE_REDIS_CHECK=1

# ============================================
# LOGGING
# ============================================
# Absolute path to the log file
# All events (startup, checks, errors, slave restarts) are logged here
LOG_FILE="/var/log/sync_monitor.log"

# Maximum log file size before rotation (in MB) - optional
LOG_MAX_SIZE=100

# ============================================
# DISPLAY & OUTPUT
# ============================================
# Include timestamps in all display output
SHOW_TIMESTAMPS=1

# Enable ANSI color codes for terminal output
# Set to 0 if redirecting to a file or non-color terminal
ENABLE_COLOR=1

# Terminal display refresh rate (in seconds)
# Controls how often the TUI dashboard is redrawn
DISPLAY_REFRESH=2

# Show verbose/detailed output (currently used for logging)
VERBOSE=1

