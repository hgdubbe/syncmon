# ==============================================================================
# SYNCMON DAEMON CONFIGURATION
# ==============================================================================
# This file is typically located at /etc/syncmon.d/config.conf
# Lines starting with # are comments. Do not use quotes around values.

# --- Core Daemon Settings ---
# How often to run the checks in seconds
CHECK_INTERVAL=30
ENABLE_MYSQL_CHECK=1
ENABLE_REDIS_CHECK=1
# Maximum log file size in MB before rotation (.old backup is created)
LOG_MAX_SIZE=100
STARTUP_CHECK=1
# If set to 1, daemon terminates if the first startup check results in an ERROR state
EXIT_ON_STARTUP_FAILURE=0

# --- File Paths ---
LOG_FILE=/var/log/syncmon/syncmon.log
STATE_FILE=/var/log/syncmon/syncmon_state.env

# --- Component: MariaDB (MySQL) ---
MYSQL_MASTER_HOST=127.0.0.1
MYSQL_MASTER_PORT=3306
MYSQL_SLAVE_HOST=127.0.0.2
MYSQL_SLAVE_PORT=3306
MYSQL_USER=syncmon
# Leave password empty if not needed
MYSQL_PASSWORD=

# --- Component: Redis ---
REDIS_MASTER_HOST=127.0.0.1
REDIS_MASTER_PORT=6379
REDIS_SLAVE_HOST=127.0.0.2
REDIS_SLAVE_PORT=6379
# Leave password empty if not needed
REDIS_PASSWORD=

# --- Service Endpoints ---
# Load Balancer checking
LB_HOST=172.31.0.10
# Optional: Direct URL to check. If empty, falls back to http://LB_HOST/
LB_CHECK_URL=

# Nextcloud Node 1
NC1_HOST=172.31.1.11
# Optional: Direct URL to check. If empty, falls back to http://NC1_HOST/status.php
NC1_CHECK_URL=

# Nextcloud Node 2
NC2_HOST=172.31.1.12
# Optional: Direct URL to check. If empty, falls back to http://NC2_HOST/status.php
NC2_CHECK_URL=

# DNS Server checking
DNS_HOST=172.31.0.53
# Domain to query from the DNS_HOST (default: cluster.local)
DNS_CHECK_DOMAIN=cluster.local
# The address the domain should resolve to (default: www.google.de)
DNS_LOOKUP_ADR=www.google.de

# NFS Server checking
NFS_HOST=172.31.2.20
# Optional string to filter the exports list (e.g. /data/shared). Leave empty for any export.
NFS_CHECK_EXPORT=
