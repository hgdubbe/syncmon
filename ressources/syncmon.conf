# SyncMon Daemon Configuration
# Installed to: /etc/syncmon.d/config.conf
# -------------------------------------------------------------------

# --- General Settings ---

# How often (in seconds) the daemon polls MySQL and Redis
CHECK_INTERVAL=30

# Enable / disable individual checks (1 = enabled, 0 = disabled)
ENABLE_MYSQL_CHECK=1
ENABLE_REDIS_CHECK=1

# Run a check immediately on daemon startup before entering the loop
STARTUP_CHECK=1

# Exit if the startup check fails (useful for fail-fast systemd units)
EXIT_ON_STARTUP_FAILURE=0

# --- Log Settings ---

# Full path to the daemon log file
LOG_FILE=/var/log/syncmon/syncmon.log

# Maximum log size in MB before rotation (0 = disabled)
LOG_MAX_SIZE=100

# --- State File ---
# Shared state file read by the TUI dashboard
STATE_FILE=/var/log/syncmon/syncmon_state.env

# --- MySQL / MariaDB Settings ---
MYSQL_MASTER_HOST=127.0.0.1
MYSQL_MASTER_PORT=3306
MYSQL_SLAVE_HOST=127.0.0.2
MYSQL_SLAVE_PORT=3306
MYSQL_USER=syncmon
MYSQL_PASSWORD=

# --- Redis Settings ---
REDIS_MASTER_HOST=127.0.0.1
REDIS_MASTER_PORT=6379
REDIS_SLAVE_HOST=127.0.0.2
REDIS_SLAVE_PORT=6379
REDIS_PASSWORD=
